 ============================================================
# Decap CMS configuration — Tutto Exquisito
# Dashboard lives at:  yoursite.com/admin
# Docs: https://decapcms.org/docs/
#
# HOSTING: Netlify (site connected to a GitHub repo)
# Setup in the Netlify dashboard:
#   1. Site configuration -> Identity -> Enable Identity
#   2. Identity -> Registration -> set to "Invite only"
#   3. Identity -> Services -> Enable Git Gateway
#   4. Identity tab -> Invite users -> your email (and later, the owner's)
# ============================================================

backend:
  name: git-gateway
  branch: main   # change to master if your repo uses master

  # --- Alternative (Vercel hosting): add these three lines and
  # set them up at https://decapbridge.com —
  # repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  # identity_url: https://auth.decapbridge.com/sites/YOUR_SITE_ID
  # gateway_url: https://gateway.decapbridge.com

# Required by Decap even if you don't upload images yet
media_folder: "tutto-exquisito-netlify/images/uploads"
public_folder: "/images/uploads"

# Optional: adds a "Save draft -> Review -> Publish" workflow
# publish_mode: editorial_workflow

collections:
  - name: "site"
    label: "Site Content"
    files:

      # ------------------------------------------------------
      # MENU  ->  content/menu.json
      # Edit drink/dish names, descriptions, prices, badges.
      # Drag items to reorder them on the site.
      # ------------------------------------------------------
      - name: "menu"
        label: "Menu (drinks & food)"
        file: "tutto-exquisito-netlify/content/menu.json"
        format: "json"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - label: "ID"
                name: "id"
                widget: "string"
                hint: "lowercase, no spaces — e.g. croissants, drinks"
              - label: "Tab label"
                name: "label"
                widget: "string"
                hint: "Shown on the tab button — e.g. Sweets & Sips"
              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.name}} — {{fields.price}}"
                fields:
                  - label: "Name"
                    name: "name"
                    widget: "string"
                  - label: "Subtitle"
                    name: "subtitle"
                    widget: "string"
                    required: false
                    default: ""
                    hint: "Small text next to the name — e.g. Ham & Provolone"
                  - label: "Description"
                    name: "description"
                    widget: "text"
                    required: false
                    default: ""
                  - label: "Price"
                    name: "price"
                    widget: "string"
                    hint: "e.g. $7.50 — or text like 'Ask in store'"
                  - label: "Badge"
                    name: "badge"
                    widget: "string"
                    required: false
                    default: ""
                    hint: "Optional tag — e.g. Guest favorite, Vegetarian"
                  - label: "Link (optional)"
                    name: "link"
                    widget: "string"
                    required: false
                    default: ""
                    hint: "If set, tapping this item opens the link (e.g. the Starbucks menu). Leave empty for a normal item."
                  - label: "Photo (optional)"
                    name: "image"
                    widget: "image"
                    required: false
                    default: ""
                    choose_url: false
                    hint: "A photo of this dish, shown at the top of its menu card. Use JPG or PNG under 1 MB — leave empty for a text-only card."

      # ------------------------------------------------------
      # SHOP HOURS  ->  content/hours.json
      # ------------------------------------------------------
      - name: "hours"
        label: "Shop Hours"
        file: "tutto-exquisito-netlify/content/hours.json"
        format: "json"
        fields:
          - label: "Summary line"
            name: "summary"
            widget: "string"
            hint: "Shown in the hero — e.g. Open daily · 7 AM – 9 PM"
          - label: "Small-print note"
            name: "note"
            widget: "string"
            required: false
            default: ""
            hint: "e.g. Holiday hours may differ."
          - label: "Days"
            name: "days"
            widget: "list"
            summary: "{{fields.day}}: {{fields.hours}}"
            fields:
              - label: "Day"
                name: "day"
                widget: "string"
              - label: "Hours"
                name: "hours"
                widget: "string"
                hint: "e.g. 7 AM – 9 PM, or 'Closed'"

      # ------------------------------------------------------
      # ANNOUNCEMENT BANNER  ->  content/announcement.json
      # A message bar at the very top of the site.
      # ------------------------------------------------------
      - name: "announcement"
        label: "Announcement Banner"
        file: "tutto-exquisito-netlify/content/announcement.json"
        format: "json"
        fields:
          - label: "Show the banner?"
            name: "enabled"
            widget: "boolean"
            default: true
          - label: "Message"
            name: "text"
            widget: "string"
            hint: "e.g. Closed July 4th · Happy Independence Day!"
          - label: "Button label (optional)"
            name: "link_label"
            widget: "string"
            required: false
            default: ""
            hint: "e.g. Order now"
          - label: "Button link (optional)"
            name: "link_url"
            widget: "string"
            required: false
            default: ""
            hint: "Full URL, e.g. https://order.toasttab.com/..."

      # ------------------------------------------------------
      # BUSINESS SETTINGS  ->  content/settings.json
      # Phone, Instagram, and real ordering links.
      # ------------------------------------------------------
      - name: "settings"
        label: "Business Settings"
        file: "tutto-exquisito-netlify/content/settings.json"
        format: "json"
        fields:
          - label: "Phone number"
            name: "phone"
            widget: "string"
            required: false
            default: ""
            hint: "e.g. (407) 555-0123 — shows a click-to-call button on the site"
          - label: "Instagram URL"
            name: "instagram"
            widget: "string"
            required: false
            default: ""
            hint: "e.g. https://instagram.com/tuttoexquisito"
          - label: "Online ordering URL"
            name: "order_url"
            widget: "string"
            required: false
            default: ""
            hint: "DoorDash / Uber Eats / Toast link. All 'Order' buttons on the site will point here."
          - label: "Directions URL"
            name: "directions_url"
            widget: "string"
            required: false
            default: ""
            hint: "Google Maps link for the 'Get directions' buttons"
